# Drift detection config for this landing zone (scanned by bicep-drift-agent).
#
# CAF-aligned: one subscription == one landing zone. This subscription-scoped
# template fans out to platform / networking / apps / logging resource groups,
# all part of the same LZ. The check sets `subscription_scoped: true` and scans
# the whole subscription ("*") in a single pass, then routes drift by owner:
# platform-owned spoke fabric to the platform team, workload resources to the
# app team - even though they live in the same subscription.

name: landingzone
subscription_id: "bd48a22c-91b9-46e6-a2ff-15893e348d83"

# Owner-routed notifications: platform-owned drift (VNets, subnets, NSGs, route
# tables, NAT gateway, public IPs) goes to the platform team; workload-owned
# drift (App Service, Key Vault, Cosmos, storage, private endpoints) to the app
# team. Webhook URLs are ${DRIFT_WEBHOOK_*} secret references, expanded by the
# agent at send time from secrets in the drift-agent repo (never plaintext here).
notifications:
  platform-team:
    slack: "${DRIFT_WEBHOOK_PLATFORM}"
    owners: [platform]
    filter: all
  app-team:
    slack: "${DRIFT_WEBHOOK_WORKLOAD}"
    owners: [workload]
    filter: all

checks:
  - name: Workload Landing Zone
    repo: jaxywaxy/azure-landingzone-bicep
    branch: main
    path: envs/dev/main.bicep
    subscription_scoped: true
    resource_groups:
      - "*"     # the whole subscription = this landing zone (CAF: one sub per LZ)
