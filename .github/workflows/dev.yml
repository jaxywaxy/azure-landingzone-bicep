name: Deploy Dev

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: bicep-dev
  cancel-in-progress: true

jobs:
  bicep:
    runs-on: ubuntu-latest
    environment:
      name: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure identity
        run: az account show

      - name: Bicep Build
        run: az bicep build --file envs/dev/main.bicep

      - name: Bicep Validate (cloud-side)
        run: |
          az deployment sub validate \
            --name "bicep-validate-dev-$(date +%s)" \
            --location australiaeast \
            --template-file envs/dev/main.bicep \
            --parameters envs/dev/parameters.json

      - name: Bicep What-If
        id: whatif
        run: |
          az deployment sub what-if \
            --name "bicep-whatif-dev-$(date +%s)" \
            --location australiaeast \
            --template-file envs/dev/main.bicep \
            --parameters envs/dev/parameters.json \
            --result-format ResourceIdOnly \
            --no-pretty-print > envs/dev/whatif-output.txt

      - name: Comment What-If on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let whatif = fs.readFileSync('envs/dev/whatif-output.txt', 'utf8');
            const limit = 60000;
            if (whatif.length > limit) {
              whatif = whatif.slice(0, limit) + '\n\n[truncated — see job logs for full output]';
            }
            const marker = '<!-- bicep-whatif-dev -->';
            const body = `${marker}\n### Bicep What-If (Dev)\n\n<details><summary>Show diff</summary>\n\n\`\`\`\n${whatif}\n\`\`\`\n\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Bicep Deploy
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          az deployment sub create \
            --name "bicep-deploy-dev-$(date +%s)" \
            --location australiaeast \
            --template-file envs/dev/main.bicep \
            --parameters envs/dev/parameters.json
